name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel an in-flight run on the same branch/PR if a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -v

      # Headline physics self-checks. Thresholds in validate.py are 1e-7 / 1e-10
      # / 1e-10; if any cross-validation between paraxial trace, ABCD matrix,
      # and the lensmaker equation drifts, this step fails the build.
      - name: Physics self-checks (must hold to 1e-9)
        run: analyze validate

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Smoke-test the wheel in a clean env
        run: |
          python -m venv /tmp/check-env
          /tmp/check-env/bin/pip install --quiet dist/*.whl
          /tmp/check-env/bin/analyze --version
          /tmp/check-env/bin/analyze validate

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
